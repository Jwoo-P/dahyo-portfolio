bio: |
  서비스 기획부터 화면 설계, 사용자 리서치까지 프로덕트 전 과정을 경험해 온 기획자입니다.
  이커머스 플랫폼, 공공 SI, AI 서비스 등 다양한 도메인에서 요구사항 분석과 화면 기획,
  프로세스 개선을 수행했습니다. 사용자 관점에서 문제를 정의하고, 실행 가능한 솔루션으로
  연결하는 것에 강점이 있습니다.
